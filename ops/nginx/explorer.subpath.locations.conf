# Include this file inside the target nginx `server { ... }` block.
# Public path: /explorer-iroha2/

location = /explorer-iroha2 {
  return 301 /explorer-iroha2/;
}

location ^~ /explorer-iroha2/ {
  root /var/www/iroha2-block-explorer-web;
  try_files $uri $uri/ /explorer-iroha2/index.html;
}

# Torii API/SSE proxy used by the explorer frontend (`/v1/explorer/*`, `/v1/telemetry/*`, etc.).
location ^~ /v1/ {
  proxy_pass http://127.0.0.1:29080;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_read_timeout 3600;
  proxy_buffering off;
}

location = /status {
  proxy_pass http://127.0.0.1:29080;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
}

location = /metrics {
  proxy_pass http://127.0.0.1:29080;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
}

location = /peers {
  proxy_pass http://127.0.0.1:29080;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_read_timeout 3600;
  proxy_buffering off;
}
